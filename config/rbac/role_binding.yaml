apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/name: previewapp
    app.kubernetes.io/managed-by: kustomize
  name: manager-rolebinding
  namespace: previews
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: manager-role
subjects:
- kind: ServiceAccount
  name: previewapp-controller-manager
  namespace: previewapp-system
