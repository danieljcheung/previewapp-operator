---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - previewapp.danieljcheung.com
  resources:
  - previewapps
  verbs:
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - previewapp.danieljcheung.com
  resources:
  - previewapps/finalizers
  verbs:
  - update
- apiGroups:
  - previewapp.danieljcheung.com
  resources:
  - previewapps/status
  verbs:
  - get
  - patch
  - update
